          - heading "Our edge, spelled out." [level=2] [ref=e9]:
            - text: Our edge,
            - text: spelled out.
        - paragraph [ref=e10]: A boutique technology studio. A seasoned senior engineering team that crafts each engagement to fit, delivering work shaped by the kind of judgment only years of production experience can produce.
