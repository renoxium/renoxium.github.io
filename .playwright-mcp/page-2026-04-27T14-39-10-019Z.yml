          - generic [ref=e13]: "01"
          - heading "A senior team, deeply seasoned" [level=3] [ref=e14]
          - paragraph [ref=e15]: Every line is reviewed by an engineer with a decade or more on production systems. We have seen the patterns, the pitfalls, the tradeoffs. That judgment is the foundation of everything we ship.
