        - generic [ref=e18]:
          - generic [ref=e19]: "02"
          - heading "Shipping is the practice" [level=3] [ref=e20]
          - paragraph [ref=e21]: We commit to a date and stand by it. Daily deploys to staging, weekly demos to you. If a feature has to slip, we cut scope before we cut quality, and we tell you 48 hours ahead, not the day of.
          - generic [ref=e22]: Predictable timelines.
        - generic [ref=e24]:
          - generic [ref=e25]: "03"
          - heading "You own every byte" [level=3] [ref=e26]
          - paragraph [ref=e27]: "Code, IP, repository, deploy keys, infrastructure: yours from commit one. We don't sell hosting, we don't lock you to a CMS, we don't own a shred of your stack. Hand off is documented, runbooked, and non negotiable."
          - generic [ref=e28]: Zero lock in.
        - generic [ref=e30]:
